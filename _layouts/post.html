---
layout: default
---
<main><section class="article-hero"><div class="container article-hero-content"><div class="breadcrumb"><a href="{{ site.baseurl }}/actualites.html">Actualités</a></div><span class="tag">Actualité de terrain</span><h1>{{ page.title }}</h1><p class="article-lead">{{ page.resume }}</p><div class="article-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d/%m/%Y" }}</time></div></div></section><article class="container post-content">{% if page.image %}<img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.alt | default: page.title }}">{% endif %}{{ content }}</article></main>
